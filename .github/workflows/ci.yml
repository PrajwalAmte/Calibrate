name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      # Install NVML stub headers so nvml-wrapper compiles on CI without a GPU.
      - name: Install NVML stub
        run: |
          sudo apt-get update -q
          sudo apt-get install -qy libnvidia-ml-dev || true
          if ! pkg-config --libs nvidia-ml 2>/dev/null; then
            echo "NVML package not found; creating stub"
            sudo mkdir -p /usr/local/lib
            echo "/* stub */" | sudo tee /usr/local/lib/libnvidia-ml.so > /dev/null
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all

  release-build:
    name: Release Build (Linux x86-64)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Release build
        run: cargo build --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: calibrate-linux-x86_64
          path: target/release/calibrate
